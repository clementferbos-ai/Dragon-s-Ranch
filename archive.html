<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Élevage de Dragons</title>
    <link rel="stylesheet" href="style.css">
</head>

   <body>
   
   <nav class="navigation-jeu">

    <button
        class="bouton-navigation actif"
        data-ecran="ecran-elevage"
    >
        Élevage
    </button>

    <button
        class="bouton-navigation"
        data-ecran="ecran-expedition"
    >
        Expédition
    </button>

    <button
        class="bouton-navigation"
        data-ecran="ecran-reproduction"
    >
        Reproduction
    </button>

    <button
        class="bouton-navigation"
        data-ecran="ecran-evaluation"
    >
        Évaluation
    </button>

</nav>

    <h1> Mon élevage de dragons</h1>

    <button id="bouton-generation">
        Générer un dragon
    </button>

    <div id="fiche-dragon">
        <p>Aucun dragon pour le moment.</p>
    </div>

    <hr>

    <h2>Mon élevage</h2>

    <p id="compteur-dragons">
        0 dragon
    </p>

    <div id="collection-dragons">
        <p>Ton élevage est vide.</p>
    </div>

<hr>

<section id="section-fiche-detaillee">

    <div id="fiche-detaillee-dragon"></div>

</section>

<section id="section-evaluation">

    <h2>Évaluation génétique</h2>

    <p>
        Étudie le potentiel reproducteur de tes dragons.
    </p>

    <div class="zone-evaluation">

        <div>
            <label for="selection-dragon-evaluation">
                Dragon à évaluer
            </label>

            <select id="selection-dragon-evaluation">
                <option value="">
                    Choisir un dragon
                </option>
            </select>
        </div>


        <div>
            <label for="selection-statistique-evaluation">
                Statistique à évaluer
            </label>

            <select id="selection-statistique-evaluation">

                <option value="">
                    Choisir une statistique
                </option>

                <option value="attaque">
                    Attaque
                </option>

                <option value="defense">
                    Défense
                </option>

                <option value="endurance">
                    Endurance
                </option>

                <option value="taille">
                    Taille
                </option>

                <option value="intelligence">
                    Intelligence
                </option>

                <option value="magie">
                    Magie
                </option>

                <option value="vitesse">
                    Vitesse
                </option>

            </select>
        </div>


        <button id="bouton-evaluation">
            Évaluer
        </button>

    </div>


    <div id="resultat-evaluation"></div>
	
	<div id="dossier-genetique"></div>

</section>

<h2>Reproduction</h2>

<div id="zone-reproduction">

    <div class="selection-parent">

        <h3>Père</h3>

        <select id="selection-pere">
            <option value="">
                Choisir un mâle
            </option>
        </select>

    </div>

    <div class="selection-parent">

        <h3>Mère</h3>

        <select id="selection-mere">
            <option value="">
                Choisir une femelle
            </option>
        </select>

    </div>

</div>

<button id="bouton-reproduction">
    Produire un œuf
</button>

<div id="zone-oeuf"></div>

<hr>

<div class="zone-danger">

    <h2>Gestion de la partie</h2>

    <button id="bouton-recommencer">
        Recommencer une partie
    </button>

</div>

    <script src="game.js"></script>

</body>
</html>
